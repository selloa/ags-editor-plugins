name: Build Hub

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'AGS.Plugin.*/**'
      - 'hub/**'
      - 'README.md'
      - '.github/workflows/build-hub.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r hub/requirements.txt

      - name: Build hub site
        run: python hub/build.py

      - name: Commit docs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/assets/
          if git diff --staged --quiet; then
            echo "No changes to docs/"
          else
            git commit -m "chore(hub): rebuild GitHub Pages site"
            git push
          fi
